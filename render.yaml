services:
  - type: web
    name: myfilmpeople-web
    runtime: python
    plan: standard
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --worker-class gthread --timeout 60 --max-requests 1000 --max-requests-jitter 100 --log-level info
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: "myfilmpeople.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_TIMEOUT
        value: "10"
      - key: PASSWORD_RESET_TOKEN_EXPIRY_MINUTES
        value: "15"
      - key: PASSWORD_RESET_REQUEST_LIMIT_PER_EMAIL
        value: "3"
      - key: PASSWORD_RESET_REQUEST_LIMIT_PER_IP
        value: "10"
      - key: PASSWORD_RESET_VERIFY_LIMIT_PER_IP
        value: "20"
      - key: PASSWORD_RESET_VERIFY_LIMIT_PER_TOKEN
        value: "5"
      - key: PASSWORD_RESET_LOOKBACK_MINUTES
        value: "15"
      - key: REDIS_URL
        fromService:
          type: redis
          name: myfilmpeople-redis
          property: connectionString

  - type: redis
    name: myfilmpeople-redis
    plan: standard
    ipAllowList: []
